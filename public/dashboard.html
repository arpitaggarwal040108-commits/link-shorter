<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Link Shortener</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="shell wide">
    <section class="panel">
      <div class="dashboard-heading">
        <div>
          <p class="eyebrow">Link activity</p>
          <h1>Dashboard</h1>
        </div>
        <a class="dashboard-link" href="/">Create link</a>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Short Code</th>
              <th>Original URL</th>
              <th>Clicks</th>
            </tr>
          </thead>
          <tbody id="links-body">
            <tr>
              <td colspan="3">Loading links...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="/dashboard.js" type="module"></script>
</body>
</html>
