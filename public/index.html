<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link Shortener</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="shell">
    <section class="panel">
      <div class="header">
        <p class="eyebrow">Netlify Link Shortener</p>
        <h1>Create short links that keep working after deploys.</h1>
      </div>

      <form id="shorten-form" class="form">
        <label for="url">Destination URL</label>
        <div class="input-row">
          <input id="url" name="url" type="url" placeholder="https://example.com" required>
          <button type="submit">Shorten</button>
        </div>
        <p id="message" class="message" role="status"></p>
      </form>

      <section id="result" class="result" hidden>
        <span>Your short URL</span>
        <a id="short-url" href=""></a>
      </section>

      <a class="dashboard-link" href="/dashboard.html">View dashboard</a>
    </section>
  </main>

  <script src="/main.js" type="module"></script>
</body>
</html>
