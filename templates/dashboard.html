<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#6a11cb,#2575fc);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:90%;
            max-width:1000px;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 15px 35px rgba(0,0,0,.3);
        }

        h1{
            text-align:center;
            margin-bottom:30px;
            color:#333;
        }

        table{
            width:100%;
            border-collapse:collapse;
            overflow:hidden;
            border-radius:10px;
        }

        th{
            background:#2575fc;
            color:white;
            padding:15px;
            font-size:18px;
        }

        td{
            padding:15px;
            text-align:center;
            border-bottom:1px solid #ddd;
        }

        tr:nth-child(even){
            background:#f5f5f5;
        }

        tr:hover{
            background:#dbe8ff;
            transition:.3s;
        }

        a{
            display:inline-block;
            margin-top:25px;
            text-decoration:none;
            background:#2575fc;
            color:white;
            padding:12px 25px;
            border-radius:8px;
            transition:.3s;
        }

        a:hover{
            background:#0d5be1;
            transform:translateY(-3px);
            box-shadow:0 10px 20px rgba(0,0,0,.2);
        }

    </style>

</head>
<body>
<div class="container">
<h1> Dashboard</h1>
<table>
<tr>
<th>Short Code</th>
<th>Original URL</th>
<th>Clicks</th>
</tr>
{% for code, info in links.items() %}
<tr>
<td>{{code}}</td>
<td>
<a href="{{info.url}}" target="_blank">
{{info.url}}
</a>
</td>
<td>{{info.clicks}}</td>
</tr>
{% endfor %}
</table>
<center>
<a href="/">⬅ Back to Home</a>
</center>
</div>
</body>
</html>
